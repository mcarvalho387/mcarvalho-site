<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCARVALHO Tecnologia</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>

body {margin:0;font-family:'Poppins',sans-serif;}
header {display:flex;justify-content:space-between;align-items:center;padding:15px 20px;background:white;position:sticky;top:0;}
header img {height:50px;}

.menu-toggle {display:none;font-size:28px;cursor:pointer;}
.menu {display:flex;}
.menu a {margin:0 10px;text-decoration:none;color:#0a1f44;}

.slider {position:relative;height:400px;overflow:hidden;}
.slide {position:absolute;width:100%;height:100%;opacity:0;transition:opacity 1.5s;}
.slide.active {opacity:1;}
.slide img {width:100%;height:100%;object-fit:cover;}

.overlay {position:absolute;bottom:40px;left:20px;color:white;}
.slide::after {content:"";position:absolute;width:100%;height:100%;background:linear-gradient(to top,rgba(0,0,0,0.6),transparent);}

.container {padding:40px 20px;}
.cards {display:flex;flex-wrap:wrap;gap:15px;}
.card {flex:1;min-width:250px;background:#f9fafb;padding:20px;border-radius:10px;}

.whatsapp {position:fixed;bottom:20px;right:20px;background:#25d366;color:white;padding:18px;border-radius:50%;}

@media(max-width:768px){
.menu {display:none;flex-direction:column;position:absolute;top:70px;right:20px;background:white;padding:10px;}
.menu.active {display:flex;}
.menu-toggle {display:block;}
.cards {flex-direction:column;}
.slider {height:250px;}
}

</style>
</head>
<body>

<header>
<img src="logo.png">
<div class="menu-toggle">☰</div>
<nav class="menu">
<a href="#">Início</a>
<a href="#servicos">Serviços</a>
<a href="#contato">Contato</a>
</nav>
</header>

<div class="slider">
<div class="slide active"><img src="img_1.jpg"><div class="overlay"><h2>Segurança</h2></div></div>
<div class="slide"><img src="img_2.jpg"><div class="overlay"><h2>Automação</h2></div></div>
<div class="slide"><img src="img_3.jpg"><div class="overlay"><h2>Wi-Fi</h2></div></div>
</div>

<section class="container" id="servicos">
<h2>Serviços</h2>
<div class="cards">
<div class="card">Câmeras</div>
<div class="card">Alarme</div>
<div class="card">Wi-Fi</div>
<div class="card">PDV</div>
</div>
</section>

<section class="container" id="contato">
<h2>Contato</h2>
<p>(12) 99707-9819</p>
</section>

<a href="https://wa.me/5512997079819" class="whatsapp">💬</a>

<script>
let index=0;
const slides=document.querySelectorAll(".slide");
setInterval(()=>{
slides[index].classList.remove("active");
index=(index+1)%slides.length;
slides[index].classList.add("active");
},4000);

document.querySelector(".menu-toggle").onclick=()=>{
document.querySelector(".menu").classList.toggle("active");
};
</script>

</body>
</html>
